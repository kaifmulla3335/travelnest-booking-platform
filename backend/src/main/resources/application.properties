# =========================
# SERVER
# Render/Railway inject their own PORT env var at runtime ? must bind to it.
# =========================
server.port=${PORT:8080}

# =========================
# DATABASE ? override via env vars in production (set these in Render's dashboard)
# =========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/travelnest_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# APPLICATION
# =========================
spring.application.name=travelnest

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/packages

# =========================
# RAZORPAY ? test-mode defaults shown here for zero-friction local dev.
# Override RAZORPAY_KEY_ID / RAZORPAY_KEY_SECRET as env vars in production.
# =========================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_T3m1EnMjC5fvcu}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:hhr9HrOXJbflxHisa2OKLGlv}

# =========================
# JWT ? override JWT_SECRET as an env var before deploying anywhere public.
# =========================
jwt.secret=${JWT_SECRET:travelnest-super-secret-key-2025-jwt-auth}

# =========================
# FRONTEND URL ? used to build the QR verification link embedded in E-Tickets.
# Set FRONTEND_URL to your deployed frontend once live (e.g. https://travelnest.vercel.app)
# =========================
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# =========================
# CORS ? comma-separated list of allowed frontend origins.
# Add your deployed frontend URL here once live, e.g.:
# CORS_ORIGINS=http://localhost:5173,https://travelnest.vercel.app
# =========================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}